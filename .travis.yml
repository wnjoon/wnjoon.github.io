language: ruby
cache: bundler
rvm:
- 2.7.6
addons:
  apt:
    packages:
    - openjdk-8-jre
before_install:
- gem update --system
- gem install bundler
- nvm install node
install:
- bundle install --jobs=3 --retry=3
- pip install --user html5validator
- npm install -g pa11y-ci
script:
- bundle exec jekyll clean && bundle exec jekyll build
- html5validator --Werror --also-check-css --also-check-svg --root _site/
- |
  (bundle exec jekyll server -d _tmp_site & echo $! >&3) 3>jekyll.pid | grep -q 'Server running' && \
  pa11y-ci --sitemap 'http://localhost:4000/sitemap.xml' \
    --sitemap-find 'https://wnjoon.github.io' --sitemap-replace 'http://localhost:4000' && \
  kill -9 "$(cat jekyll.pid)" && \
  rm -f jekyll.pid && \
  rm -rf _tmp_site
branches:
  only:
  - master
deploy:
  provider: pages
  skip_cleanup: true
  github_token: "$WNJOON_GITHUB_TOKEN"
  keep_history: true
  local_dir: _site
  target_branch: master
  on:
    branch: source
env:
  global:
    secure: 
